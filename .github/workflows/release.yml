name: Release

on:
  push:
    tags:
      # Broad filter — strict regex validation happens in the detect step below.
      # Matches stable (YYYY.MM.DD[a-z]?) and beta (YYYY.MM.DD.b<N>).
      - '20[0-9][0-9].[0-9]*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 2026.05.30, 2026.05.30a, 2026.05.30.b1). Creates the tag at the dispatched branch''s HEAD if it does not already exist.'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve version string
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME}"
          fi
          if [[ -z "$VERSION" ]]; then
            echo "::error::No version supplied."
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $VERSION"

      - name: Classify version (beta vs stable)
        id: detect
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if [[ "$VERSION" =~ ^[0-9]{4}\.[0-9]{2}\.[0-9]{2}\.b[0-9]+$ ]]; then
            echo "is_beta=true"        >> "$GITHUB_OUTPUT"
            echo "target_branch=dev"   >> "$GITHUB_OUTPUT"
            echo "plg_file=easy.rsync.beta.plg" >> "$GITHUB_OUTPUT"
            echo "beta_flag=-b"        >> "$GITHUB_OUTPUT"
          elif [[ "$VERSION" =~ ^[0-9]{4}\.[0-9]{2}\.[0-9]{2}[a-z]?$ ]]; then
            echo "is_beta=false"       >> "$GITHUB_OUTPUT"
            echo "target_branch=main"  >> "$GITHUB_OUTPUT"
            echo "plg_file=easy.rsync.plg" >> "$GITHUB_OUTPUT"
            echo "beta_flag="          >> "$GITHUB_OUTPUT"
          else
            echo "::error::Version '$VERSION' matches neither stable (YYYY.MM.DD[a-z]?) nor beta (YYYY.MM.DD.b<N>)."
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.detect.outputs.target_branch }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify tag points at target branch
        if: github.event_name == 'push'
        run: |
          TARGET="${{ steps.detect.outputs.target_branch }}"
          if ! git merge-base --is-ancestor "${{ github.sha }}" "origin/$TARGET"; then
            echo "::error::Tag commit ${{ github.sha }} is not reachable from origin/$TARGET. Beta tags must be on dev; stable tags on main."
            exit 1
          fi

      - name: Build .txz inside Slackware container
        run: |
          docker run --rm \
            -v "${{ github.workspace }}":/workspace \
            -w /workspace \
            aclemons/slackware:15.0 \
            bash -c "./pkg_build.sh -y -V '${{ steps.version.outputs.version }}' ${{ steps.detect.outputs.beta_flag }}"
          sudo chown -R "$(id -u):$(id -g)" .

      - name: Commit updated .plg
        run: |
          PLG="${{ steps.detect.outputs.plg_file }}"
          if git diff --quiet -- "$PLG"; then
            echo "No changes to $PLG — skipping commit."
          else
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add "$PLG"
            git commit -m "Release ${{ steps.version.outputs.version }}"
            git push origin "${{ steps.detect.outputs.target_branch }}"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name:    ${{ steps.version.outputs.version }}
          name:        ${{ steps.version.outputs.version }}
          files:       archive/*.txz
          prerelease:  ${{ steps.detect.outputs.is_beta }}
          make_latest: ${{ steps.detect.outputs.is_beta == 'false' }}
          generate_release_notes: true
